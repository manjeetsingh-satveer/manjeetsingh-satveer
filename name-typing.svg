<svg width="340" height="110" viewBox="0 0 340 110" xmlns="http://www.w3.org/2000/svg">
  <defs>
    <clipPath id="reveal">
      <rect x="0" y="0" width="0" height="110">
        <animate attributeName="width" values="0;320;320;0;0" keyTimes="0;0.42;0.82;0.92;1" dur="5s" repeatCount="indefinite"/>
      </rect>
    </clipPath>
  </defs>

  <text x="10" y="72" font-family="'Trebuchet MS', Verdana, sans-serif" font-weight="700" font-size="48" clip-path="url(#reveal)">
    <animate attributeName="fill" values="#6a5cff;#4cc9f0;#55e08f;#c77dff;#6a5cff" dur="5s" repeatCount="indefinite"/>
    Manjeet Singh
  </text>

  <rect x="8" y="26" width="4" height="52" fill="#55e08f">
    <animate attributeName="x" values="8;328;328;8;8" keyTimes="0;0.42;0.82;0.92;1" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="fill" values="#6a5cff;#4cc9f0;#55e08f;#c77dff;#6a5cff" dur="5s" repeatCount="indefinite"/>
    <animate attributeName="opacity" values="1;1;0;0;1;1" keyTimes="0;0.42;0.45;0.87;0.9;1" dur="5s" repeatCount="indefinite"/>
  </rect>
</svg>
